<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CIP Tracker" />
<meta name="theme-color" content="#0d141a" />
<title>CIP Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0d141a; --panel:#161f28; --panelHi:#1c2832; --border:#2a3a47;
    --text:#e8eef3; --muted:#8aa1b2; --faint:#5d7384;
    --ok:#22c55e; --warn:#f5a524; --lock:#ef4444; --new:#64748b; --cip:#a78bfa;
    --green:#3fae5a; --orange:#f47b20; --csd:#38bdf8; --hot:#f472b6; --other:#94a3b8;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);padding-bottom:48px;-webkit-font-smoothing:antialiased}
  button{cursor:pointer;font-family:inherit;border:none}
  button:disabled{cursor:not-allowed;opacity:.45}
  input,select{font-family:inherit}
  .wrap{max-width:760px;margin:0 auto}
  .head{border-bottom:1px solid var(--border);background:var(--panel);padding:18px 18px 0}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .between{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
  h1{margin:0;font-size:24px;font-weight:700;letter-spacing:-.3px}
  .sub{margin:6px 0 0 18px;font-size:13px;color:var(--muted)}
  .accentbar{width:10px;height:26px;border-radius:2px;background:linear-gradient(var(--green),var(--orange))}
  .clock-lbl{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
  .clock{font-size:15px;font-family:var(--mono)}
  .inp{display:block;width:100%;padding:10px 12px;background:#0d141a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px}
  .tabs{display:flex;gap:4px;margin-top:14px}
  .tab{padding:10px 18px;background:transparent;color:var(--muted);font-weight:600;font-size:15px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--text);border-bottom-color:var(--orange)}
  .pad{padding:0 18px}
  .chip{padding:7px 13px;border-radius:99px;font-size:13px;font-weight:600;background:transparent;color:var(--muted);border:1px solid var(--border)}
  .banner{margin:16px 18px 0;padding:14px 16px;border-radius:10px;display:flex;align-items:center;gap:12px}
  .dot{width:12px;height:12px;border-radius:99px;flex-shrink:0}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .cardbody{padding:14px 16px}
  .tname{font-size:17px;font-weight:600}
  .tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
  .meta{margin-top:4px;font-size:12px;color:var(--faint);font-family:var(--mono)}
  .statebadge{font-size:11px;font-weight:700;letter-spacing:.6px;padding:4px 8px;border-radius:6px;white-space:nowrap}
  .count{font-family:var(--mono);font-size:26px;font-weight:600}
  .prog{margin-top:10px;height:7px;background:var(--panelHi);border-radius:99px;overflow:hidden}
  .btn{padding:11px 14px;border-radius:8px;font-size:14px}
  .btn-go{background:var(--green);color:#06210f;font-weight:700;flex:1 1 auto}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .editpanel{border-top:1px solid var(--border);background:var(--panelHi);padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .lbl{font-size:12px;color:var(--muted)}
  .lbl .inp{margin-top:6px}
  .lbox{padding:10px 12px;border-radius:8px;background:#2a2342;border:1px solid #a78bfa55;font-family:var(--mono);margin-top:12px}
  .lead{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
  .splitbar{margin-top:9px;height:8px;background:var(--panelHi);border-radius:99px;overflow:hidden;display:flex}
  .recent{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
  .empty{color:var(--muted);font-size:14px;padding:8px 2px}
  .danger{background:transparent;color:var(--lock);border:1px solid #ef444455;padding:8px 13px;border-radius:7px;font-size:13px}
  .softbtn{padding:8px 12px;border-radius:7px;font-size:13px;background:transparent;border:1px solid var(--border);color:var(--muted)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<input type="file" id="restoreFile" accept="application/json,.json" style="display:none" />

<script>
"use strict";

var STORE_KEY = "cipTrackerData_v1";
var DAY = 86400000, HOUR = 3600000, MIN = 60000;
var CATS = {
  csd:{label:"CSD",hex:"#38bdf8"}, hotfill:{label:"Hot-fill",hex:"#f472b6"}, other:{label:"Other",hex:"#94a3b8"}
};
var DEFAULTS = [
  {id:"tank-1",name:"Tank 1",category:"csd"},{id:"tank-2",name:"Tank 2",category:"csd"},
  {id:"tank-3",name:"Tank 3",category:"csd"},{id:"tank-5",name:"Tank 5",category:"csd"},
  {id:"tank-6",name:"Tank 6",category:"csd"},{id:"tank-7",name:"Tank 7",category:"csd"},
  {id:"tank-4",name:"Tank 4",category:"hotfill"},{id:"tank-8",name:"Tank 8",category:"hotfill"},
  {id:"tank-10",name:"Tank 10",category:"hotfill"},{id:"tank-11",name:"Tank 11",category:"hotfill"},
  {id:"sugar-tank",name:"Sugar Tank",category:"other"},{id:"sugar-truck",name:"Sugar Truck",category:"other"},
  {id:"bulk-1",name:"Bulk 1",category:"other"},{id:"bulk-2",name:"Bulk 2",category:"other"}
].map(function(t,i){return Object.assign({},t,{lastCip:null,lock:null,cycleDays:7,warnHours:5,order:i});});

var state = { tanks:[], history:[], operator:"", soundOn:true,
  ui:{ tab:"tanks", filter:"all", period:"week", openId:null } };

function seed(){ return DEFAULTS.map(function(t){return Object.assign({},t);}); }
function load(){
  try{ var raw=localStorage.getItem(STORE_KEY);
    if(raw){ var d=JSON.parse(raw);
      state.tanks=(d.tanks&&d.tanks.length)?mergeDefaults(d.tanks):seed();
      state.history=d.history||[]; state.operator=d.operator||""; state.soundOn=(d.soundOn!==false);
      return; }
  }catch(e){}
  state.tanks=seed(); state.history=[]; state.operator=""; state.soundOn=true;
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({tanks:state.tanks,history:state.history,operator:state.operator,soundOn:state.soundOn})); }
  catch(e){ console.error("save failed",e); }
}
function mergeDefaults(existing){
  var byName={}; DEFAULTS.forEach(function(d){byName[d.name.toLowerCase()]=d;});
  var up=existing.map(function(t){ var d=byName[(t.name||"").toLowerCase()];
    return Object.assign({},t,{lock:t.lock||null,category:t.category||(d?d.category:"other"),
      cycleDays:t.cycleDays||7,warnHours:t.warnHours||5,order:(t.order!=null)?t.order:(d?d.order:9000)}); });
  var have={}; up.forEach(function(t){have[(t.name||"").toLowerCase()]=1;});
  DEFAULTS.forEach(function(d){ if(!have[d.name.toLowerCase()]) up.push(Object.assign({},d)); });
  return up;
}

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function statusOf(t,now){
  if(!t.lastCip) return {state:"new",remaining:0,progress:0,lockoutMs:0};
  var lastMs=new Date(t.lastCip).getTime();
  var lockoutMs=lastMs+t.cycleDays*DAY, warnMs=lockoutMs-t.warnHours*HOUR;
  var st="ok"; if(now>=lockoutMs) st="locked"; else if(now>=warnMs) st="warning";
  return {state:st,remaining:lockoutMs-now,progress:Math.max(0,Math.min(1,(now-lastMs)/(t.cycleDays*DAY))),lockoutMs:lockoutMs};
}
function pad(n){return String(n).padStart(2,"0");}
function fmtDur(ms){var a=Math.abs(ms),d=Math.floor(a/DAY),h=Math.floor((a%DAY)/HOUR),m=Math.floor((a%HOUR)/MIN);
  return d>0?(d+"d "+pad(h)+"h "+pad(m)+"m"):(pad(h)+"h "+pad(m)+"m");}
function fmtStamp(iso){return iso?new Date(iso).toLocaleString("en-AU",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",hour12:true}):"\u2014";}
function fmtShort(iso){return new Date(iso).toLocaleString("en-AU",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",hour12:true});}
function toLocalInput(iso){var d=iso?new Date(iso):new Date();return new Date(d.getTime()-d.getTimezoneOffset()*MIN).toISOString().slice(0,16);}
function periodStart(p,now){var d=new Date(now);
  if(p==="week"){var day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return d.getTime();}
  if(p==="7d") return now-7*DAY;
  if(p==="month"){d.setHours(0,0,0,0);d.setDate(1);return d.getTime();}
  return 0;}
var SHEX={locked:"#ef4444",warning:"#f5a524",new:"#64748b",ok:"#22c55e"};
var SL={locked:"LOCKED",warning:"CIP DUE SOON",new:"NO CIP LOGGED",ok:"IN CYCLE"};
var RANK={locked:0,warning:1,new:2,ok:3};
function findTank(id){for(var i=0;i<state.tanks.length;i++) if(state.tanks[i].id===id) return state.tanks[i];return null;}

/* ---------- alarms: in-app sound + browser notification ---------- */
var audioCtx=null, prevState={}, firstAlarmRun=true;
function ensureAudio(){ try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); }catch(e){} }
function beep(){ ensureAudio(); if(!audioCtx) return;
  var t0=audioCtx.currentTime;
  [0,0.28,0.56].forEach(function(off){
    var o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type="square"; o.frequency.value=880; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001,t0+off);
    g.gain.exponentialRampToValueAtTime(0.25,t0+off+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+off+0.2);
    o.start(t0+off); o.stop(t0+off+0.22);
  });
}
function notify(title,bodyTxt){ try{ if(window.Notification && Notification.permission==="granted") new Notification(title,{body:bodyTxt}); }catch(e){} }
function checkAlarms(now){
  state.tanks.forEach(function(t){
    var st = t.lock ? "cip" : statusOf(t,now).state;
    var prev = prevState[t.id];
    if(!firstAlarmRun && prev && prev!==st && (st==="warning"||st==="locked") && state.soundOn){
      beep();
      notify(st==="locked"?(t.name+" is LOCKED"):(t.name+" \u2014 CIP due soon"),
             st==="locked"?"7-day lockout reached. Run CIP to unlock.":"Locks in under "+t.warnHours+" h. Get its CIP scheduled.");
    }
    prevState[t.id]=st;
  });
  firstAlarmRun=false;
}
function toggleSound(){
  state.soundOn=!state.soundOn; save();
  if(state.soundOn){ ensureAudio(); try{ if(window.Notification && Notification.permission==="default") Notification.requestPermission(); }catch(e){} beep(); }
  render();
}

/* ---------- phone calendar reminders (.ics) ---------- */
function icsDate(ms){ return new Date(ms).toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,""); }
function icsEsc(s){ return String(s).replace(/([\\;,])/g,"\\$1").replace(/\n/g,"\\n"); }
function buildICS(items){
  var L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CIP Tracker//EN","CALSCALE:GREGORIAN"];
  var stamp=icsDate(Date.now());
  items.forEach(function(it){
    L.push("BEGIN:VEVENT");
    L.push("UID:"+it.id+"-"+it.lockoutMs+"@cip-tracker");
    L.push("DTSTAMP:"+stamp);
    L.push("DTSTART:"+icsDate(it.lockoutMs));
    L.push("DTEND:"+icsDate(it.lockoutMs+30*MIN));
    L.push("SUMMARY:CIP lockout \u2014 "+icsEsc(it.name));
    L.push("DESCRIPTION:"+icsEsc(it.name+" reaches its "+it.cycleDays+"-day lockout. Run CIP before this time."));
    L.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:CIP due soon \u2014 "+icsEsc(it.name)+" locks in "+it.warnHours+" h","TRIGGER:-PT"+it.warnHours+"H","END:VALARM");
    L.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(it.name)+" is locking out now","TRIGGER:PT0S","END:VALARM");
    L.push("END:VEVENT");
  });
  L.push("END:VCALENDAR");
  return L.join("\r\n");
}
function reminderItems(idOnly){
  var now=Date.now();
  return state.tanks.filter(function(t){ return t.lastCip && !t.lock && (!idOnly || t.id===idOnly); })
    .map(function(t){ var s=statusOf(t,now); return {id:t.id,name:t.name,lockoutMs:s.lockoutMs,warnHours:t.warnHours,cycleDays:t.cycleDays}; })
    .filter(function(it){ return it.lockoutMs>now; });
}
function downloadReminders(idOnly){
  var items=reminderItems(idOnly);
  if(items.length===0){ alert(idOnly?"This tank isn't in cycle yet. Finish a CIP on it first.":"No tanks in cycle yet. Finish a CIP first, then add reminders."); return; }
  var blob=new Blob([buildICS(items)],{type:"text/calendar"});
  var url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=idOnly?("cip-reminder-"+idOnly+".ics"):"cip-reminders.ics"; a.click(); URL.revokeObjectURL(url);
}

/* ---------- actions ---------- */
function startCip(id){
  if(!state.operator.trim()){alert("Enter your name at the top first, so the tank shows who's doing the CIP.");return;}
  var t=findTank(id); if(!t||t.lock) return;
  t.lock={by:state.operator.trim(),at:new Date().toISOString()}; save(); render();
}
function finishCip(id){
  var t=findTank(id); if(!t) return;
  var at=new Date().toISOString(), by=(t.lock&&t.lock.by)||state.operator.trim()||"\u2014";
  t.lastCip=at; t.lock=null;
  state.history.unshift({id:"h"+Date.now(),tankId:t.id,tankName:t.name,category:t.category||"other",by:by,at:at});
  if(state.history.length>2000) state.history=state.history.slice(0,2000);
  save(); render();
}
function cancelCip(id){var t=findTank(id); if(t){t.lock=null; save(); render();}}
function resetTank(id){var t=findTank(id); if(t&&confirm("Reset this tank? Clears its CIP record and any in-progress CIP. (Tally credit is kept.)")){t.lastCip=null;t.lock=null;save();render();}}
function resetAllTanks(){if(confirm("Reset ALL tank countdowns? Tally history is kept.")){state.tanks.forEach(function(t){t.lastCip=null;t.lock=null;});save();render();}}
function clearHistory(){if(confirm("Clear the whole CIP tally history? This can't be undone.")){state.history=[];save();render();}}
function removeTank(id){if(confirm("Remove this tank?")){state.tanks=state.tanks.filter(function(t){return t.id!==id;});if(state.ui.openId===id)state.ui.openId=null;save();render();}}
function addTank(){
  var nameEl=document.getElementById("newName"), catEl=document.getElementById("newCat");
  var name=(nameEl.value||"").trim(); if(!name) return;
  var order=state.tanks.reduce(function(m,t){return Math.max(m,t.order||0);},0)+1;
  state.tanks.push({id:"t"+Date.now(),name:name,category:catEl.value,lastCip:null,lock:null,cycleDays:7,warnHours:5,order:order});
  nameEl.value=""; save(); render();
}
function setField(id,key,val,doRender){var t=findTank(id);if(!t)return;t[key]=val;save();if(doRender)render();}
function backup(){
  var blob=new Blob([JSON.stringify({tanks:state.tanks,history:state.history,operator:state.operator},null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob), a=document.createElement("a");
  var d=new Date(), stamp=d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  a.href=url; a.download="cip-tracker-backup-"+stamp+".json"; a.click(); URL.revokeObjectURL(url);
}
function restore(file){
  var r=new FileReader();
  r.onload=function(){try{var d=JSON.parse(r.result);
    if(!d||!d.tanks){alert("That file doesn't look like a CIP Tracker backup.");return;}
    if(!confirm("Restore this backup? It will replace your current data.")) return;
    state.tanks=mergeDefaults(d.tanks); state.history=d.history||[]; if(d.operator)state.operator=d.operator;
    save(); render();
  }catch(e){alert("Couldn't read that file.");}};
  r.readAsText(file);
}

/* ---------- render ---------- */
function render(){
  var now=Date.now(), ui=state.ui;
  var nowStr=new Date(now).toLocaleString("en-AU",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",hour12:true});
  var h='';
  h+='<div class="head"><div class="between">';
  h+= '<div><div class="row" style="gap:8px"><span class="accentbar"></span><h1>CIP Tracker</h1></div>';
  h+=  '<p class="sub">7-day cycle \u00b7 warns 5 h before lockout</p></div>';
  h+= '<div style="text-align:right"><div class="clock-lbl">Now</div><div class="clock">'+nowStr+'</div>';
  h+=  '<button class="chip" data-act="sound" style="margin-top:8px;'+(state.soundOn?'color:var(--cip);border-color:#a78bfa55':'')+'">'+(state.soundOn?'\u{1F514} Alarm on':'\u{1F515} Alarm off')+'</button></div>';
  h+= '</div>';
  h+= '<div class="row" style="margin-top:14px"><span class="lbl">You:</span>'+
        '<input id="opName" class="inp" style="width:180px;padding:8px 11px" placeholder="your name" value="'+esc(state.operator)+'" data-fld="operator" />'+
        '<span style="font-size:12px;color:var(--faint)">shown on tanks you start, and on your tally</span></div>';
  h+= '<div class="tabs">'+
        '<button class="tab '+(ui.tab==="tanks"?"on":"")+'" data-act="tab" data-val="tanks">Tanks</button>'+
        '<button class="tab '+(ui.tab==="people"?"on":"")+'" data-act="tab" data-val="people">People</button></div>';
  h+='</div>';

  h+= (ui.tab==="tanks") ? renderTanks(now) : renderPeople(now);

  h+= '<div class="pad" style="margin-top:26px;border-top:1px solid var(--border);padding-top:16px">';
  h+=  '<div class="eyebrow">Your data</div>';
  h+=  '<p style="font-size:12px;color:var(--faint);margin:8px 0 12px">Saved on this device. Back up regularly, and use the file to move it to a shared version later.</p>';
  h+=  '<div class="row"><button class="btn btn-ghost" data-act="backup">Back up (download)</button>'+
        '<button class="btn btn-ghost" data-act="restore">Restore from file</button></div></div>';

  document.getElementById("app").innerHTML=h;
  checkAlarms(now);
}

function renderTanks(now){
  var ui=state.ui;
  var all=state.tanks.map(function(t){return {t:t,s:statusOf(t,now)};});
  var lockedN=all.filter(function(c){return c.s.state==="locked";}).length;
  var warnN=all.filter(function(c){return c.s.state==="warning";}).length;
  var inCip=state.tanks.filter(function(t){return t.lock;}).length;
  var b = lockedN>0 ? {c:"#ef4444",dim:"#3a1414",t:lockedN+" tank"+(lockedN>1?"s":"")+" LOCKED \u2014 run CIP to unlock"}
        : warnN>0 ? {c:"#f5a524",dim:"#3a2c0c",t:warnN+" tank"+(warnN>1?"s":"")+" need"+(warnN>1?"":"s")+" CIP soon"}
        : {c:"#22c55e",dim:"#143524",t:"All tanks in cycle"};
  var list=all.filter(function(c){return ui.filter==="all"||c.t.category===ui.filter;}).sort(function(a,b2){
    if(!!b2.t.lock!==!!a.t.lock) return a.t.lock?-1:1;
    var r=RANK[a.s.state]-RANK[b2.s.state]; if(r) return r;
    if(a.s.remaining!==b2.s.remaining) return a.s.remaining-b2.s.remaining;
    return (a.t.order==null?9999:a.t.order)-(b2.t.order==null?9999:b2.t.order);
  });

  var h='';
  h+='<div class="banner" style="background:'+b.dim+';border:1px solid '+b.c+'55">'+
       '<span class="dot" style="background:'+b.c+';box-shadow:0 0 10px '+b.c+'"></span>'+
       '<span style="font-size:15px;font-weight:600;color:'+b.c+'">'+b.t+'</span>'+
       (inCip>0?'<span style="font-size:13px;color:var(--cip);margin-left:auto">'+inCip+' in CIP now</span>':'')+'</div>';

  h+='<div class="pad" style="margin-top:12px"><button class="chip" data-act="remindAll" style="color:var(--text)">\u23F0 Add lockout alarms to phone calendar</button>'+
     '<div style="font-size:12px;color:var(--faint);margin-top:6px">Sets a calendar alert before each tank locks (uses its warning hours) \u2014 works even when this app is closed.</div></div>';

  var filters=[["all","All"],["csd","CSD"],["hotfill","Hot-fill"],["other","Other"]];
  h+='<div class="row pad" style="margin-top:16px">';
  filters.forEach(function(f){var on=ui.filter===f[0];var ac=f[0]==="all"?"#e8eef3":CATS[f[0]].hex;
    h+='<button class="chip" data-act="filter" data-val="'+f[0]+'" style="'+(on?'border-color:'+ac+';background:'+ac+'22;color:'+ac:'')+'">'+f[1]+'</button>';});
  h+='<button class="chip" data-act="resetAll" style="margin-left:auto;color:var(--faint)">Reset all tanks</button></div>';

  h+='<div class="pad" style="display:flex;flex-direction:column;gap:12px;margin-top:14px">';
  if(list.length===0) h+='<div class="empty">No tanks in this view.</div>';
  list.forEach(function(c){h+=tankCard(c.t,c.s);});
  h+='</div>';

  h+='<div class="row pad" style="margin-top:18px">'+
       '<input id="newName" class="inp" style="flex:1 1 140px" placeholder="Add a tank" />'+
       '<select id="newCat" class="inp" style="width:120px;flex:0 0 auto"><option value="csd">CSD</option><option value="hotfill">Hot-fill</option><option value="other">Other</option></select>'+
       '<button class="btn" style="background:var(--panelHi);color:var(--text);border:1px solid var(--border)" data-act="add">Add</button></div>';
  return h;
}

function tankCard(t,s){
  var col=SHEX[s.state], cat=CATS[t.category]||CATS.other, op=state.operator.trim();
  var lockedByMe=t.lock&&op&&t.lock.by===op, lockedByOther=t.lock&&!lockedByMe, open=state.ui.openId===t.id;
  var h='<div class="card" style="border-color:'+(t.lock?"#a78bfa66":"var(--border)")+';border-left:5px solid '+(t.lock?"#a78bfa":col)+'"><div class="cardbody">';
  h+= '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
  h+=  '<div><div class="row" style="gap:8px"><span class="tname">'+esc(t.name)+'</span>'+
        '<span class="tag" style="color:'+cat.hex+';background:'+cat.hex+'1f;border:1px solid '+cat.hex+'44">'+cat.label+'</span></div>'+
        '<div class="meta">Last CIP: '+fmtStamp(t.lastCip)+'</div></div>';
  h+=  '<span class="statebadge" style="color:'+col+';background:'+col+'22;border:1px solid '+col+'55">'+SL[s.state]+'</span></div>';

  if(t.lock){
    h+='<div class="lbox"><span style="color:var(--cip);font-weight:600">\u25CF IN CIP</span>'+
       '<span style="color:var(--muted);font-size:13px"> \u2014 by '+esc(t.lock.by)+' \u00b7 started '+fmtStamp(t.lock.at)+'</span></div>';
  } else {
    h+='<div style="margin-top:12px;font-family:var(--mono)">';
    if(s.state==="new"){ h+='<div style="font-size:14px;color:var(--muted)">Start a CIP to begin the countdown.</div>'; }
    else { h+='<div style="display:flex;align-items:baseline;gap:8px"><span class="count" style="color:'+col+'">'+fmtDur(s.remaining)+'</span>'+
              '<span style="font-size:13px;color:var(--muted)">'+(s.state==="locked"?"overdue \u2014 locked":"until lockout")+'</span></div>'+
              '<div style="font-size:12px;color:var(--faint);margin-top:2px">Locks at '+fmtStamp(new Date(s.lockoutMs).toISOString())+'</div>'; }
    h+='</div>';
    if(s.state!=="new") h+='<div class="prog"><div style="width:'+(s.progress*100)+'%;height:100%;background:'+col+';transition:width .4s ease"></div></div>';
  }

  h+='<div class="row" style="margin-top:14px">';
  if(!t.lock){
    h+='<button class="btn btn-go" data-act="start" data-id="'+t.id+'">Start CIP</button>';
    h+='<button class="btn btn-ghost" data-act="edit" data-id="'+t.id+'">'+(open?"Close":"Edit")+'</button>';
  } else if(lockedByMe){
    h+='<button class="btn btn-go" data-act="finish" data-id="'+t.id+'">Finish CIP</button>';
    h+='<button class="btn btn-ghost" data-act="cancel" data-id="'+t.id+'">Cancel</button>';
  } else {
    h+='<div style="flex:1;padding:11px 0;font-size:13px;color:var(--cip)">Locked while '+esc(t.lock.by)+' runs CIP \u2014 others can\'t change it</div>';
  }
  h+='</div></div>';

  if(open&&!t.lock){
    h+='<div class="editpanel">';
    h+='<label class="lbl">Tank name<input class="inp" value="'+esc(t.name)+'" data-fld="name" data-id="'+t.id+'" /></label>';
    h+='<label class="lbl">Type<select class="inp" data-chg="category" data-id="'+t.id+'">'+
       '<option value="csd"'+(t.category==="csd"?" selected":"")+'>CSD</option>'+
       '<option value="hotfill"'+(t.category==="hotfill"?" selected":"")+'>Hot-fill</option>'+
       '<option value="other"'+(t.category==="other"?" selected":"")+'>Other</option></select></label>';
    h+='<label class="lbl">Set / correct last CIP time<input type="datetime-local" class="inp" value="'+toLocalInput(t.lastCip)+'" data-chg="lastCip" data-id="'+t.id+'" /></label>';
    h+='<div style="display:flex;gap:10px">'+
       '<label class="lbl" style="flex:1">Cycle (days)<input type="number" min="1" class="inp" value="'+t.cycleDays+'" data-chg="cycleDays" data-id="'+t.id+'" /></label>'+
       '<label class="lbl" style="flex:1">Warn (hours)<input type="number" min="1" class="inp" value="'+t.warnHours+'" data-chg="warnHours" data-id="'+t.id+'" /></label></div>';
    h+='<div class="row">';
    h+= '<button class="softbtn" data-act="remind" data-id="'+t.id+'">\u23F0 Calendar alarm</button>';
    h+= '<button data-act="resetTank" data-id="'+t.id+'" style="padding:8px 12px;border-radius:7px;font-size:13px;background:transparent;color:var(--warn);border:1px solid #f5a52455">Reset CIP</button>';
    h+= '<button class="danger" data-act="remove" data-id="'+t.id+'">Remove tank</button>';
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

function renderPeople(now){
  var ui=state.ui, start=periodStart(ui.period,now);
  var inP=state.history.filter(function(x){return new Date(x.at).getTime()>=start;});
  var tally={};
  inP.forEach(function(x){var k=((x.by||"\u2014").trim())||"\u2014"; if(!tally[k])tally[k]={count:0,csd:0,hotfill:0,other:0}; tally[k].count++; tally[k][x.category||"other"]++;});
  var rows=Object.keys(tally).map(function(n){return Object.assign({name:n},tally[n]);}).sort(function(a,b){return b.count-a.count;});
  var maxC=rows.length?rows[0].count:1;
  var periods=[["week","This week"],["7d","Last 7 days"],["month","This month"],["all","All time"]];

  var h='<div class="row pad" style="margin-top:18px">';
  periods.forEach(function(p){var on=ui.period===p[0];
    h+='<button class="chip" data-act="period" data-val="'+p[0]+'" style="'+(on?'border-color:var(--orange);background:#f47b2022;color:var(--orange)':'')+'">'+p[1]+'</button>';});
  h+='</div>';
  h+='<div class="pad" style="margin-top:14px;font-size:13px;color:var(--muted);font-family:var(--mono)">'+inP.length+' CIP'+(inP.length===1?"":"s")+' \u00b7 '+rows.length+' '+(rows.length===1?"person":"people")+'</div>';

  h+='<div class="pad" style="display:flex;flex-direction:column;gap:10px;margin-top:12px">';
  if(rows.length===0) h+='<div class="empty">No CIPs recorded in this period yet. Set your name, then use Start \u2192 Finish on a tank to start counting.</div>';
  rows.forEach(function(r,i){
    h+='<div class="lead"><div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px">'+
        '<span style="font-size:16px;font-weight:600"><span style="color:var(--faint);font-family:var(--mono);margin-right:8px">'+(i+1)+'</span>'+esc(r.name)+'</span>'+
        '<span style="font-family:var(--mono);font-size:22px;font-weight:600;color:var(--orange)">'+r.count+'</span></div>';
    h+= '<div class="splitbar"><div style="width:'+(r.csd/maxC*100)+'%;background:#38bdf8"></div>'+
        '<div style="width:'+(r.hotfill/maxC*100)+'%;background:#f472b6"></div>'+
        '<div style="width:'+(r.other/maxC*100)+'%;background:#94a3b8"></div></div>';
    h+= '<div style="margin-top:7px;font-size:12px;color:var(--faint)">'+r.csd+' CSD \u00b7 '+r.hotfill+' hot-fill \u00b7 '+r.other+' other</div></div>';
  });
  h+='</div>';

  if(inP.length>0){
    h+='<div class="pad eyebrow" style="margin-top:22px">Recent CIPs</div>';
    h+='<div class="pad" style="margin-top:10px;display:flex;flex-direction:column">';
    inP.slice(0,25).forEach(function(x){
      h+='<div class="recent"><span><span style="color:var(--text)">'+esc(x.by)+'</span><span style="color:var(--faint)"> \u00b7 '+esc(x.tankName)+'</span></span>'+
         '<span style="color:var(--faint);font-family:var(--mono);white-space:nowrap">'+fmtShort(x.at)+'</span></div>';
    });
    h+='</div>';
  }
  h+='<div class="pad" style="margin-top:20px"><button class="danger" data-act="clearHistory">Clear tally history</button></div>';
  return h;
}

/* ---------- events ---------- */
document.addEventListener("click",function(e){
  ensureAudio();
  var el=e.target.closest("[data-act]"); if(!el) return;
  var act=el.dataset.act, id=el.dataset.id, val=el.dataset.val;
  if(act==="tab"){state.ui.tab=val;render();}
  else if(act==="filter"){state.ui.filter=val;render();}
  else if(act==="period"){state.ui.period=val;render();}
  else if(act==="edit"){state.ui.openId=(state.ui.openId===id?null:id);render();}
  else if(act==="start"){startCip(id);}
  else if(act==="finish"){finishCip(id);}
  else if(act==="cancel"){cancelCip(id);}
  else if(act==="resetTank"){resetTank(id);}
  else if(act==="remove"){removeTank(id);}
  else if(act==="resetAll"){resetAllTanks();}
  else if(act==="clearHistory"){clearHistory();}
  else if(act==="add"){addTank();}
  else if(act==="backup"){backup();}
  else if(act==="restore"){document.getElementById("restoreFile").click();}
  else if(act==="sound"){toggleSound();}
  else if(act==="remind"){downloadReminders(id);}
  else if(act==="remindAll"){downloadReminders(null);}
});
document.addEventListener("input",function(e){
  var t=e.target;
  if(t.dataset.fld==="operator"){state.operator=t.value;save();}
  else if(t.dataset.fld==="name"){setField(t.dataset.id,"name",t.value,false);}
});
document.addEventListener("change",function(e){
  var t=e.target;
  if(t.id==="restoreFile" && t.files && t.files[0]){restore(t.files[0]); t.value="";}
  else if(t.dataset.chg==="category"){setField(t.dataset.id,"category",t.value,true);}
  else if(t.dataset.chg==="lastCip"){ if(t.value) setField(t.dataset.id,"lastCip",new Date(t.value).toISOString(),true); }
  else if(t.dataset.chg==="cycleDays"){setField(t.dataset.id,"cycleDays",Math.max(1,parseInt(t.value)||1),true);}
  else if(t.dataset.chg==="warnHours"){setField(t.dataset.id,"warnHours",Math.max(1,parseInt(t.value)||1),true);}
});
setInterval(function(){
  var a=document.activeElement;
  if(a && (a.tagName==="INPUT"||a.tagName==="SELECT"||a.tagName==="TEXTAREA")) return;
  render();
},20000);

load(); render();
</script>
</body>
</html>
